services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  ledger-engine:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ledger
      DB_SSL_MODE: disable
      DB_MAX_CONNECTIONS: 25
      DB_MIN_CONNECTIONS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      
      # NATS Configuration
      NATS_ENABLED: false
      NATS_URL: nats://nats:4222
      NATS_SUBJECT: ledger.events
      
      # Server Configuration
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      
      # Idempotency Configuration
      IDEMPOTENCY_RETENTION: 24h
      
      # Performance Configuration
      MAX_BATCH_SIZE: 1000
      BALANCE_QUERY_TIMEOUT: 100ms
      TRANSACTION_TIMEOUT: 5s
      ENABLE_BALANCE_SNAPSHOTS: false
      
      # Supported Currencies
      SUPPORTED_CURRENCIES: USD,EUR,GBP,JPY,CNY,AUD,CAD,CHF,SEK,NZD
      
      # Logging Configuration
      LOG_LEVEL: info
      LOG_FORMAT: json
      
      # Authentication Configuration
      AUTH_ENABLE_API_KEY: true
      AUTH_ENABLE_JWT: false
      # AUTH_API_KEYS intentionally omitted for local dev.
      # The app falls back to the built-in default dev key:
      #   X-API-Key: dev-key-12345
      
      # Tracing Configuration (disabled by default)
      TRACING_ENABLED: false
      TRACING_SERVICE_NAME: double-entry-ledger-engine
      TRACING_ENDPOINT: http://localhost:4318/v1/traces
      TRACING_ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  trafficgen:
    image: golang:1.25-alpine
    profiles: ["trafficgen"]
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      TRAFFICGEN_BASE_URL: http://ledger-engine:8080
      TRAFFICGEN_API_KEY: dev-key-12345
      TRAFFICGEN_DURATION: 30s
      TRAFFICGEN_CONCURRENCY: 20
      TRAFFICGEN_RPS: 1000
      TRAFFICGEN_BATCH_SIZE: 5
      TRAFFICGEN_ACCOUNTS: 100
      TRAFFICGEN_CURRENCY: USD
      TRAFFICGEN_MIN_AMOUNT: 1
      TRAFFICGEN_MAX_AMOUNT: 100
      TRAFFICGEN_CSV_OUTPUT: /app/trafficgen_results.csv
    command: ["/bin/sh", "-c", "go run ./cmd/trafficgen"]
    depends_on:
      ledger-engine:
        condition: service_healthy

volumes:
  postgres_data:
